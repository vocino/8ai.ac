title: "8ai.ac — AI Tools Directory"
description: "The open-source directory of AI tools, services, and platforms. Free and paid. Community-driven."
url: "https://8ai.ac"
baseurl: ""

author:
  name: "Vocino"
  url: "https://vocino.com"

twitter:
  username: vocino
  card: summary_large_image

social:
  name: "Vocino"
  links:
    - https://threads.com/vocino
    - https://x.com/vocino

collections:
  tools:
    output: true
    permalink: /tools/:slug/
    sort_by: name

defaults:
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
  # Default OG/social image for all pages (used when sharing links)
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - _redirects

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - CONTRIBUTING.md
  - .github
  - validate.js
  - package.json
  - package-lock.json

sass:
  style: compressed
