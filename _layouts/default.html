<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="{{ '/sitemap.xml' | absolute_url }}">
  {% if page.json_ld %}
  <script type="application/ld+json">{{ page.json_ld }}</script>
  {% endif %}
</head>
<body>
  {% include nav.html %}
  {{ content }}
  <script src="https://code.iconify.design/iconify-icon/2.0.0/iconify-icon.min.js" defer></script>
  <script src="{{ '/assets/js/filter.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
</body>
</html>
