<nav class="tool-detail__breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ '/' | relative_url }}">Home</a>
  {% if include.categories %}
    {% assign first_cat = include.categories | first %}
    {% for cat in site.data.categories %}
      {% if cat.slug == first_cat %}
        / <a href="{{ '/category/' | append: cat.slug | append: '/' | relative_url }}">{{ cat.label }}</a>
      {% endif %}
    {% endfor %}
  {% endif %}
  / {{ include.name }}
</nav>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{ site.url }}{{ site.baseurl }}/" }
    {% if include.categories %}
    {% assign first_cat = include.categories | first %}
    {% for cat in site.data.categories %}
      {% if cat.slug == first_cat %}
    ,{ "@type": "ListItem", "position": 2, "name": {{ cat.label | jsonify }}, "item": "{{ site.url }}{{ site.baseurl }}/category/{{ cat.slug }}/" }
    ,{ "@type": "ListItem", "position": 3, "name": {{ include.name | jsonify }}, "item": "{{ site.url }}{{ site.baseurl }}{{ include.current_item | default: '' }}" }
      {% endif %}
    {% endfor %}
    {% else %}
    ,{ "@type": "ListItem", "position": 2, "name": {{ include.name | jsonify }}, "item": "{{ site.url }}{{ site.baseurl }}{{ include.current_item | default: '' }}" }
    {% endif %}
  ]
}
</script>
